version = 1

[values]
LinstorGatewayVersion = "*"
LinstorGatewayLocalBinary = ""
# DRBD/LINSTOR/reactor versions are passed in by the Makefile. Empty means
# "no version pin": yum picks the latest stable from the enabled repos.
DrbdVersion = ""
DrbdUtilsVersion = ""
LinstorVersion = ""
DrbdReactorVersion = ""

[[steps]]
[steps.container]
image = "quay.io/ansible/awx-ee:24.6.1"
user = "0"
command = [
	"sh", "/virter/workspace/virter/run-ansible-playbook.sh",
	"--inventory", "/virter/workspace/virter/inventory",
	"/virter/workspace/virter/provision-playbook.yml",
	"--extra-vars", "linstor_gateway_version={{ .LinstorGatewayVersion }}",
	"--extra-vars", "linstor_gateway_local_binary={{ .LinstorGatewayLocalBinary }}",
	"--extra-vars", "drbd_version={{ .DrbdVersion }}",
	"--extra-vars", "drbd_utils_version={{ .DrbdUtilsVersion }}",
	"--extra-vars", "linstor_version={{ .LinstorVersion }}",
	"--extra-vars", "drbd_reactor_version={{ .DrbdReactorVersion }}",
	"--tags", "testimage"
]
[steps.container.env]
ANSIBLE_PIPELINING = "yes"
