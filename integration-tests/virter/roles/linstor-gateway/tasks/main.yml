---
- name: Add LINBIT repo
  yum_repository:
    name: drbd
    description: LINBIT Packages for LINSTOR and DRBD
    baseurl: "{{ linbit_repo_baseurl }}/yum/rhel{{ rhel_major_version }}/drbd-9/x86_64"
    gpgcheck: true
    gpgkey: https://packages.linbit.com/package-signing-pubkey.asc
  tags:
    - preload

- name: Add CI repo (disabled by default — only the linstor-gateway under test pulls from here)
  yum_repository:
    name: linbit-ci
    description: LINBIT CI Packages
    baseurl: "{{ ci_repo_baseurl }}"
    gpgcheck: false
    enabled: false
    metadata_expire: "0"
  tags:
    - preload

- name: Install resource-agents
  yum:
    pkg:
      - resource-agents
    enablerepo: drbd
  tags:
    - preload

- name: Install resource-agents helpers
  yum:
    pkg:
      - iptables
      - targetcli
  tags:
    - preload

- name: Install scst utils
  yum:
    pkg:
      - scstadmin
      - scst
    enablerepo: drbd
  tags:
    - preload

- name: Install kmod-scst
  yum:
    pkg:
      - "kmod-scst-*_{{ kernel_version | regex_replace('^(\\d+\\.\\d+.\\d+)-(.*)\\.el.*$', '\\1_\\2') }}*"
    enablerepo: drbd
  tags:
    - preload

- name: Configure automatic module loading
  copy:
    dest: /etc/modules-load.d/scst.conf
    content: |
      scst
      iscsi-scst
      scst_vdisk
  tags:
    - preload

- name: Enable iscsi-scst service
  service:
    name: iscsi-scst
    state: stopped
    enabled: yes
  tags:
    - preload

- name: Install nvme CLI
  yum:
    pkg:
      - nvme-cli
      - nvmetcli
  tags:
    - preload

- name: Add CentOS Storage SIG repo (nfs-ganesha)
  # nfs-ganesha was retired from EPEL 9; the CentOS Storage SIG is the
  # canonical EL9 source.
  yum_repository:
    name: centos-storage-nfsganesha-9
    description: CentOS Storage SIG - nfs-ganesha 9
    baseurl: https://mirror.stream.centos.org/SIGs/9-stream/storage/x86_64/nfsganesha-9/
    gpgcheck: false
  tags:
    - preload

- name: Install nfs-ganesha
  yum:
    pkg:
      - nfs-ganesha
      - nfs-ganesha-vfs
  # Bound the task: dnf has no aggressive timeout when a mirror is
  # unreachable, so without this a network issue would hang the pipeline
  # until the CI job timeout (~1h) instead of surfacing an error.
  async: 300
  poll: 5
  tags:
    - preload

- name: Install LINSTOR Gateway from package
  yum:
    pkg:
      - "linstor-gateway-{{ linstor_gateway_version }}"
    enablerepo: linbit-ci
    update_cache: true
  register: linstor_gateway_install
  retries: 5
  until: linstor_gateway_install is success
  when: linstor_gateway_local_binary | length == 0
  tags:
    - testimage

- name: Install LINSTOR Gateway from local binary
  copy:
    src: "{{ linstor_gateway_local_binary }}"
    dest: /usr/sbin/linstor-gateway
    mode: '0755'
  when: linstor_gateway_local_binary | length > 0
  tags:
    - testimage

- name: Disable nfs server
  service:
    name: nfs-server
    state: stopped
    enabled: no
  tags:
    - preload

- name: Disable nfs-ganesha service
  service:
    name: nfs-ganesha
    state: stopped
    enabled: no
  tags:
    - preload
